{% extends 'base.html' %}
{% set page_title = 'Заказ принят' %}

  <div class="product-thumb accent-rose">✨</div>
  <h1>Заказ принят</h1>
  <p class="lead">Мы сохранили заказ №{{ order['id'] }}. Дальше его можно открыть в профиле и следить за статусом.</p>

{% endblock %}
