<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trust Road</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Trust Road</h1>
      <p class="sub">Курсы Capitron Bank • Бэлэн бус → Зарах</p>
    </section>

    <section class="card calculator-card">
      <div class="field">
        <label for="amount">Сумма</label>
        <input id="amount" type="number" min="0" step="0.01" placeholder="Например, 50000" />
      </div>

      <div class="field">
        <label for="currency">Валюта клиента</label>
        <select id="currency"></select>
      </div>

      <button id="convertBtn">Рассчитать</button>

      <div class="result-grid">
        <div class="result-box">
          <span class="result-label">Итого в тугриках (MNT)</span>
          <strong id="mntResult">—</strong>
        </div>
        <div class="result-box">
          <span class="result-label">Итого в рублях (RUB)</span>
          <strong id="rubResult">—</strong>
        </div>
      </div>

      <div class="meta">
        <span id="status">Загрузка курсов Capitron...</span>
      </div>
    </section>

    <section class="card rates-card">
      <div class="rates-head">
        <h2>Валюты Capitron и курс из последнего столбца</h2>
        <button id="refreshBtn" class="ghost-btn">Обновить</button>
      </div>
      <p class="rates-note">Клик по строке — выбрать валюту</p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Валюта</th>
              <th>Курс (MNT)</th>
            </tr>
          </thead>
          <tbody id="ratesBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
async function loadRates(force = false) {
  const statusEl = document.getElementById("status");
  const tableBody = document.getElementById("rates-body");

  try {
    statusEl.textContent = "Загрузка курсов...";
    tableBody.innerHTML = "";

    const response = await fetch(`/api/rates${force ? "?force=1" : ""}`);
    const data = await response.json();

    if (!data.ok) {
      throw new Error(data.error || "Не удалось загрузить курсы");
    }

    const ratesObj = data.rates || {};
    const rates = Object.values(ratesObj);

    if (!rates.length) {
      statusEl.textContent = "Курсы не найдены.";
      return;
    }

    rates.sort((a, b) => a.code.localeCompare(b.code));

    tableBody.innerHTML = "";
    rates.forEach((item) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${item.code || ""}</td>
        <td>${item.name || item.code || ""}</td>
        <td>${formatNumber(item.rate)}</td>
      `;

      tr.addEventListener("click", () => {
        const currencySelect = document.getElementById("currency");
        if (currencySelect) {
          currencySelect.value = item.code;
        }
        calculate();
      });

      tableBody.appendChild(tr);
    });

    fillCurrencySelect(rates);

    const source = data.meta?.source || "unknown";
    statusEl.textContent =
      source === "capitron_live"
        ? "Курсы загружены с Capitron."
        : source === "cache"
        ? "Курсы загружены из cache."
        : source === "stale_cache"
        ? "Live-курсы недоступны, показан последний сохранённый cache."
        : "Курсы загружены.";
  } catch (error) {
    console.error(error);
    statusEl.textContent = error.message || "Ошибка загрузки курсов.";
  }
}

function fillCurrencySelect(rates) {
  const select = document.getElementById("currency");
  if (!select) return;

  const currentValue = select.value;
  select.innerHTML = "";

  rates.forEach((item) => {
    const option = document.createElement("option");
    option.value = item.code;
    option.textContent = `${item.code} — ${item.name || item.code}`;
    select.appendChild(option);
  });

  if (currentValue && rates.some((x) => x.code === currentValue)) {
    select.value = currentValue;
  }
}

async function calculate() {
  const amount = document.getElementById("amount")?.value;
  const currency = document.getElementById("currency")?.value;
  const mntEl = document.getElementById("result-mnt");
  const rubEl = document.getElementById("result-rub");

  if (!amount || !currency) {
    if (mntEl) mntEl.textContent = "—";
    if (rubEl) rubEl.textContent = "—";
    return;
  }

  try {
    const response = await fetch(
      `/api/convert?amount=${encodeURIComponent(amount)}&currency=${encodeURIComponent(currency)}`
    );
    const data = await response.json();

    if (!data.ok) {
      throw new Error(data.error || "Ошибка расчёта");
    }

    if (mntEl) mntEl.textContent = formatNumber(data.total_mnt);
    if (rubEl) rubEl.textContent = formatNumber(data.total_rub);
  } catch (error) {
    console.error(error);
    if (mntEl) mntEl.textContent = "Ошибка";
    if (rubEl) rubEl.textContent = "Ошибка";
  }
}

function formatNumber(value) {
  const num = Number(value);
  if (Number.isNaN(num)) return "—";
  return num.toLocaleString("ru-RU", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("reload-rates")?.addEventListener("click", () => loadRates(true));
  document.getElementById("amount")?.addEventListener("input", calculate);
  document.getElementById("currency")?.addEventListener("change", calculate);
  loadRates(false);
});
</script>
</body>
</html>
