<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trust Road</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Trust Road</h1>
      <p class="sub">Курсы Capitron Bank • Бэлэн бус → Зарах</p>
    </section>

    <section class="card calculator-card">
      <div class="field">
        <label for="amount">Сумма</label>
        <input id="amount" type="number" min="0" step="0.01" placeholder="Например, 50000" />
      </div>

      <div class="field">
        <label for="currency">Валюта клиента</label>
        <select id="currency"></select>
      </div>

      <button id="convertBtn">Рассчитать</button>

      <div class="result-grid">
        <div class="result-box">
          <span class="result-label">Итого в тугриках (MNT)</span>
          <strong id="mntResult">—</strong>
        </div>
        <div class="result-box">
          <span class="result-label">Итого в рублях (RUB)</span>
          <strong id="rubResult">—</strong>
        </div>
      </div>

      <div class="meta">
        <span id="status">Загрузка курсов Capitron...</span>
      </div>
    </section>

    <section class="card rates-card">
      <div class="rates-head">
        <h2>Валюты Capitron и курс из последнего столбца</h2>
        <button id="refreshBtn" class="ghost-btn">Обновить</button>
      </div>
      <p class="rates-note">Клик по строке — выбрать валюту</p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Валюта</th>
              <th>Курс (MNT)</th>
            </tr>
          </thead>
          <tbody id="ratesBody"></tbody>
        </table>
      </div>
    </section>
  </main>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
