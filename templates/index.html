<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trust Road</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="page">
    <section class="container">
      <h1>Trust Road</h1>
      <p class="subtitle">Курсы Capitron Bank · Бэлэн бус → Зарах</p>

      <div class="card">
        <label for="amount">Сумма</label>
        <input id="amount" type="number" value="100" min="0" step="any" />

        <label for="currency">Валюта клиента</label>
        <select id="currency"></select>

        <button id="calculate-btn" type="button">Рассчитать</button>

        <div class="results">
          <div class="result-box">
            <div class="result-label">Итого в тугриках (MNT)</div>
            <div id="result-mnt" class="result-value">—</div>
          </div>
          <div class="result-box">
            <div class="result-label">Итого в рублях (RUB)</div>
            <div id="result-rub" class="result-value">—</div>
          </div>
        </div>

        <div id="status" class="status">Загрузка курсов...</div>
      </div>

      <div class="card">
        <div class="card-header">
          <div>
            <h2>Валюты Capitron и курс из последнего столбца</h2>
            <p class="hint">Клик по строке — выбрать валюту</p>
          </div>
          <button id="reload-rates" type="button">Обновить</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>Валюта</th>
              <th>Название</th>
              <th>Курс (MNT)</th>
            </tr>
          </thead>
          <tbody id="rates-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
